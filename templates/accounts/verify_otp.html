{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    <h4>Verify OTP</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <label>Enter OTP</label>

                        <input
                            type="text"
                            name="otp"
                            class="form-control"
                            required
                        >

                        <button class="btn btn-success mt-3 w-100">
                            Verify OTP
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

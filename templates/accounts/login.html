{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4>Patient Login</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <label>Mobile Number</label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            maxlength="10"
                            required
                        >

                        <button class="btn btn-primary mt-3 w-100">
                            Send OTP
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
